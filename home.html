<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Tracker-Home page </title>

     <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind cdn link -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font name  -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body class="bg-gray-100">

<header>
<nav class="shadow-sm bg-white">
  <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-4">

    <div class="left flex items-center gap-3">
      <img src="./assets/github-logo.png" alt="logo" class="w-8 h-8">
      <h1 class="text-xl font-semibold text-gray-700">
        GitHub Issues Tracker
      </h1>
    </div>
            
    <form id="searchForm" class=" right flex items-center gap-3 w-full md:w-auto">

      <input 
        id="searchInput"
        type="text"
        placeholder="Search issues..."
        class="w-full md:w-64 px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-400"
      >
      <button 
        type="submit"
        class="btn bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition">
       Search
      </button>
    </form>

  </div>
</nav>
</header>


<section class="space-y-2 p-2 md:p-3 w-11/12 mx-auto min-h-screen">

  <div class=" bg-white p-1.5 rounded flex gap-1.5 flex-wrap w-full">
    <button class="btn btn-active btn-primary bg-white text-primary hover:bg-primary hover:text-white">All</button>
    <button class="btn btn-soft btn-primary bg-white text-primary hover:bg-primary hover:text-white">Open</button>
    <button class="btn btn-soft btn-primary bg-white text-primary hover:bg-primary hover:text-white">Closed</button>
  </div>

  <div class="bg-white rounded-lg p-3 flex flex-col md:flex-row items-start md:items-center justify-between shadow-sm gap-2 w-full">
    
    <div class="flex items-center gap-2">
      <div class="bg-purple-100 p-1.5 rounded-full">
        <img src="./assets/Aperture.png" alt="" class="w-6 h-6">
      </div>

      <div>
        <h2  class="font-semibold text-sm text-gray-700">50 Issues</h2>
        <p class="text-xs text-gray-500">Track and manage your project issues</p>
      </div>
    </div>

    <div class="flex items-center gap-2 text-xs">
      <div class="flex items-center gap-1">
        <img src="./assets/Open-Status.png" alt="" class="w-4 h-4">
        <p class="text-gray-600">Open</p>
      </div>

      <div class="flex items-center gap-1">
        <img src="./assets/Closed- Status .png" alt="" class="w-4 h-4">
        <p class="text-gray-600">Closed</p>
      </div>
    </div>

  </div>

  <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 w-full mx-auto">  </div>

</section>

<div id="issue-modal" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center hidden p-4">
    
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-[800px] min-h-[500px] overflow-hidden flex flex-col animate-in fade-in zoom-in duration-300">
        
        <div id="modal-content" class="p-8 flex-grow overflow-y-auto">
             </div>

        <div class="px-8 pb-8 flex justify-end">
            <button onclick="closeModal()" class="bg-[#581CFF] hover:bg-[#4716CC] text-white px-8 py-2.5 rounded-xl font-bold transition-all active:scale-95">
                Close
            </button>
        </div>
    </div>
</div>

<!-- <script src="script/search.js"></script> -->
<script src="script/card.js"></script>
</body>

</html>
